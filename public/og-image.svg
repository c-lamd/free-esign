<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="FreeESign — free, private PDF tools">
  <rect width="1200" height="630" fill="#F5F2EA"/>
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#1A1714" stroke-width="2" rx="18"/>
  <!-- accent tab, top-left -->
  <rect x="72" y="84" width="34" height="34" rx="7" fill="#FF4D00"/>
  <text x="120" y="111" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="1" fill="#1A1714">FreeESign</text>
  <!-- headline -->
  <text x="72" y="300" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="92" font-weight="800" fill="#1A1714">Free, private</text>
  <text x="72" y="402" font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" font-size="92" font-weight="800" fill="#1A1714">PDF tools<tspan fill="#FF4D00">.</tspan></text>
  <!-- tool list -->
  <text x="74" y="474" font-family="'Consolas', 'SF Mono', ui-monospace, Menlo, monospace" font-size="27" font-weight="600" letter-spacing="2" fill="#726A5D">SIGN · MERGE · SPLIT · ORGANIZE · CONVERT</text>
  <!-- privacy strap -->
  <circle cx="84" cy="540" r="6" fill="#FF4D00"/>
  <text x="102" y="549" font-family="'Consolas', 'SF Mono', ui-monospace, Menlo, monospace" font-size="24" font-weight="600" letter-spacing="1" fill="#1A1714">No uploads · No sign-up · Your files never leave your browser</text>
</svg>
